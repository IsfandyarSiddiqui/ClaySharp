  namespace: ClaySharp.Interop
  summary: Defines a contiguous block of pre-allocated unmanaged memory that Clay uses for all structural and dynamic layout allocations.
  remarks: >-
    Developers must allocate a block of memory (e.g., via <xref href="System.Runtime.InteropServices.Marshal.AllocHGlobal(System.Int32)" data-throw-if-not-resolved="false"></xref>) of at least <xref href="ClaySharp.Interop.ClayNative.MinMemorySize" data-throw-if-not-resolved="false"></xref>

    and pass it to initialize the arena. Clay performs linear allocator increments internally within this block.
