  summary: A native string wrapper used by Clay to represent text safely across the ABI.
  remarks: >-
    Because runtime marshalling is disabled, strings are passed as raw byte pointers (<xref href="ClaySharp.Interop.ClayString.Chars" data-throw-if-not-resolved="false"></xref>) 

    typically pointing to UTF-8 or ANSI encoded character arrays.
